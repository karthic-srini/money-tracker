<style>

.mo{position:fixed;inset:0;z-index:50;display:flex;align-items:flex-end;justify-content:center;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:opacity .25s;}

.dz{width:100%;padding:24px;font-size:13px;font-weight:600;font-family:inherit;border:2px dashed var(--brd2);border-radius:12px;color:var(--t40);background:none;cursor:pointer;transition:all .2s;text-align:center;}
.dz:hover{border-color:rgba(245,158,11,.4);color:var(--amber);}
.ib{border-radius:16px;padding:18px;background:rgba(59,130,246,.06);border:1px solid rgba(59,130,246,.12);max-width:480px;margin:0 auto;}
.ib h4{font-size:13px;font-weight:700;color:#93c5fd;margin-bottom:6px;} .ib p{font-size:11px;color:rgba(147,197,253,.6);line-height:1.6;}

.empty .ei{font-size:48px;margin-bottom:12px;} .empty h3{font-size:17px;font-weight:700;} .empty p{font-size:13px;margin-top:6px;}

@keyframes tin{from{opacity:0;transform:translateX(-50%) translateY(-8px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}

.bk{font-size:13px;font-weight:700;color:var(--amber);background:none;border:none;cursor:pointer;font-family:inherit;padding:4px 0;}

.dh{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:16px;}

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
const SKEY='wv_inv_v3',KKEY='wv_sett_v3',MKEY='wv_theme',VKEY='wv_vals_v1',HKEY='wv_hide',PKEY='wv_sips_v1',GKEY='wv_gsync',OW=['Self','Spouse'],
PC=['#FF6B4A','#2EC4F6','#7ED957','#FFB340','#A855F7','#FF5FA2','#38BDF8','#FB923C','#4ADE80','#818CF8','#F472B6','#22D3EE'],
MOS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'],
DS={exchangeRate:110,categories:{India:['Mutual Funds','Stocks','SGB','Govt Bonds','Corporate Bonds','RBI Gilt','ETFs','FD','RD','Debt'],UK:['Bank Savings','ISA - Cash','ISA - Stocks & Investments','Pension Account','Debt']},methods:['SIP','One-Time','Lumpsum','EMI'],funds:{'India::Debt':['Personal Loan','Home Loan / Mortgage','Car Loan','Education Loan','Credit Card','Gold Loan','Other Loan'],'UK::Debt':['Mortgage','Personal Loan','Car Finance','Student Loan','Credit Card','Other Loan']},assetClass:{}};
const AC=['Equity','Debt','Hybrid','Gold','Cash','Other'],ACC={'Equity':'#10b981','Debt':'#3b82f6','Hybrid':'#a855f7','Gold':'#f59e0b','Cash':'#22d3ee','Other':'rgba(255,255,255,0.3)'};

let S={inv:[],vals:[],sips:[],sett:structuredClone(DS),tab:'dashboard',drill:null,drillF:{year:'All',month:'All'},filters:{owner:'All',country:'All',category:'All',method:'All'},modal:null,edit:null,sTab:'general',mf:null,impM:'replace',lastOwner:'Self',lastCountry:'India',sortCol:'tot',sortDir:'desc',search:'',hide:false,pendingSips:[],sipF:{owner:'All',country:'All',status:'All'},jbKey:'',jbBin:'',gsyncing:false};

function load(){try{const d=localStorage.getItem(SKEY);if(d)S.inv=JSON.parse(d);}catch{}try{const s=localStorage.getItem(KKEY);if(s){const p=JSON.parse(s);S.sett={...DS,...p,categories:{...DS.categories,...p.categories},funds:{...DS.funds,...p.funds},assetClass:{...DS.assetClass,...(p.assetClass||{})}};}}catch{}
try{const v=localStorage.getItem(VKEY);if(v)S.vals=JSON.parse(v);}catch{}
try{const p=localStorage.getItem(PKEY);if(p)S.sips=JSON.parse(p);}catch{}
try{const g=localStorage.getItem(GKEY);if(g){const p=JSON.parse(g);S.jbKey=p.key||'';S.jbBin=p.bin||'';}}catch{}
// Ensure Debt category exists + dedup all fund lists
['India','UK'].forEach(c=>{if(!S.sett.categories[c])S.sett.categories[c]=[];if(!S.sett.categories[c].includes('Debt'))S.sett.categories[c].push('Debt');const dk=`${c}::Debt`;if(!S.sett.funds[dk]||!S.sett.funds[dk].length)S.sett.funds[dk]=DS.funds[dk]||[];});
Object.keys(S.sett.funds).forEach(k=>{S.sett.funds[k]=[...new Set(S.sett.funds[k])];});
// Migrate old sipAmount/sipDate entries to SIP masters
migrateSips();}
function migrateSips(){
  if(S.sips.length)return; // already migrated
  const seen=new Set();
  S.inv.forEach(i=>{
    if(i.sipAmount&&i.sipDate&&i.method==='SIP'){
      const k=`${i.owner}||${i.country}||${i.category}||${i.fundName}||${i.sipAmount}||${i.sipDate}`;
      if(seen.has(k))return;seen.add(k);
      S.sips.push({id:uid(),owner:i.owner,country:i.country,category:i.category,fundName:i.fundName,amount:Number(i.sipAmount),currency:i.currency,sipDay:Number(i.sipDate),freq:'monthly',status:'active',startDate:i.date||new Date().toISOString().slice(0,10)});
    }
  });
  if(S.sips.length)sP();
}
function checkPendingSips(){
  S.pendingSips=[];
  const today=new Date();const ty=today.getFullYear();const tm=today.getMonth();const td=today.getDate();const todayTs=today.getTime();
  const localDate=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  S.sips.filter(s=>s.status==='active').forEach(sip=>{
    const start=pD(sip.startDate)||new Date(2020,0,1);
    const freq=sip.freq||'monthly';

    if(freq==='weekly'){
      let d=new Date(start.getFullYear(),start.getMonth(),start.getDate());
      const minDate=new Date(ty,tm,td);minDate.setDate(minDate.getDate()-84);
      if(d<minDate)d=new Date(minDate.getFullYear(),minDate.getMonth(),minDate.getDate());
      while(d.getTime()<=todayTs){
        const wKey=localDate(d);
        const wEnd=new Date(d.getFullYear(),d.getMonth(),d.getDate()+6);
        const skipped=sip.skipped&&sip.skipped.includes(wKey);
        const exists=S.inv.some(i=>{
          if(i.fundName!==sip.fundName||i.owner!==sip.owner||i.category!==sip.category||i.country!==sip.country||i.method!=='SIP')return false;
          if(i._sipId===sip.id&&i._sipMonth===wKey)return true;
          const id=pD(i.date);if(!id)return false;
          return id>=d&&id<=wEnd;
        });
        if(!exists&&!skipped){
          const wNum=Math.ceil(d.getDate()/7);
          S.pendingSips.push({sip,year:d.getFullYear(),month:d.getMonth(),week:wNum,mKey:wKey});
        }
        d=new Date(d.getFullYear(),d.getMonth(),d.getDate()+7);
      }
    }else{
      let y=start.getFullYear(),m=start.getMonth();
      while(y<ty||(y===ty&&m<=tm)){
        const mKey=`${y}-${String(m+1).padStart(2,'0')}`;
        const skipped=sip.skipped&&sip.skipped.includes(mKey);
        const exists=S.inv.some(i=>{
          if(i.fundName!==sip.fundName||i.owner!==sip.owner||i.category!==sip.category||i.country!==sip.country||i.method!=='SIP')return false;
          if(i._sipId===sip.id&&i._sipMonth===mKey)return true;
          const d=pD(i.date);if(!d)return false;
          const ik=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
          return ik===mKey;
        });
        if(!exists&&!skipped&&(y>start.getFullYear()||m>=start.getMonth())){
          if(y===ty&&m===tm&&td<sip.sipDay){}
          else{S.pendingSips.push({sip,year:y,month:m,mKey});}
        }
        m++;if(m>11){m=0;y++;}
      }
    }
  });
}
function sI(){try{localStorage.setItem(SKEY,JSON.stringify(S.inv));}catch{}}
function sS(){try{localStorage.setItem(KKEY,JSON.stringify(S.sett));}catch{}}

function uid(){return Date.now().toString(36)+Math.random().toString(36).substr(2,9)}
function fmt(a,c){
  if(S.hide)return c==='INR'?'₹ ****':'£ ****';
  const n=Number(a);
  if(c==='INR'){
    const abs=Math.abs(n);
    if(abs>=10000000)return(n<0?'−':'')+'₹'+(abs/10000000).toFixed(2).replace(/\.?0+$/,'')+'Cr';
    if(abs>=100000)return(n<0?'−':'')+'₹'+(abs/100000).toFixed(2).replace(/\.?0+$/,'')+'L';
    if(abs>=1000)return(n<0?'−':'')+'₹'+abs.toLocaleString('en-IN',{maximumFractionDigits:0});
    return(n<0?'−':'')+'₹'+abs.toLocaleString('en-IN',{maximumFractionDigits:0});
  }
  return'£'+n.toLocaleString('en-GB',{minimumFractionDigits:2,maximumFractionDigits:2});
}
function pD(v){if(!v)return null;if(v instanceof Date)return isNaN(v)?null:v;if(typeof v==='number')return new Date(new Date(1899,11,30).getTime()+v*86400000);const s=String(v).trim();let m=s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);if(m)return new Date(+m[3],+m[2]-1,+m[1]);m=s.match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);if(m)return new Date(+m[1],+m[2]-1,+m[3]);const d=new Date(s);return isNaN(d)?null:d}
function toI(v){const d=pD(v);if(!d)return new Date().toISOString().slice(0,10);return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function toD(v){const d=pD(v);if(!d)return'';return`${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`}
function gC(c){return[...new Set(S.sett.categories?.[c]||DS.categories[c]||[])].sort((a,b)=>a.localeCompare(b))}
function gM(){return[...new Set(S.sett.methods||DS.methods)].sort((a,b)=>a.localeCompare(b))}
function gF(c,k){return[...new Set(S.sett.funds?.[`${c}::${k}`]||[])].sort((a,b)=>a.localeCompare(b))}
function isDebt(cat){return cat==='Debt';}
function gAC(c,cat,fund){return S.sett.assetClass[`${c}::${cat}::${fund}`]||'Other';}
function latestVal(){return S.vals.length?S.vals[S.vals.length-1]:null;}
function getInvested(){
  const m={};
  S.inv.forEach(i=>{if(isDebt(i.category))return;const k=`${i.owner}::${i.country}::${i.category}`;m[k]=(m[k]||0)+i.amount;});
  return m;
}
function getInvestedAsOf(asOfDate){
  const m={};
  const cutoff=pD(asOfDate);
  S.inv.forEach(i=>{if(isDebt(i.category))return;const d=pD(i.date);if(!d||!cutoff||d>cutoff)return;const k=`${i.owner}::${i.country}::${i.category}`;m[k]=(m[k]||0)+i.amount;});
  return m;
}

let _tt;function toast(m,t='s'){let e=document.querySelector('.toast');if(e)e.remove();e=document.createElement('div');e.className='toast '+(t==='e'?'te':t==='i'?'ti':'ts');e.textContent=m;document.body.appendChild(e);clearTimeout(_tt);_tt=setTimeout(()=>e.remove(),2500)}

function svgPie(data,owner){
  if(!data.length)return'';
  const total=data.reduce((s,d)=>s+d.value,0);
  if(total===0)return'';
  const sz=160,cx=sz/2,cy=sz/2,or=sz/2-4,ir=or*0.58,mr=(ir+or)/2,gap=0.03;
  const ow=owner||'All';
  let a=-Math.PI/2,paths='',labels='';
  data.forEach((d,i)=>{
    const pct=d.value/total,angle=pct*Math.PI*2;
    if(pct<0.002){a+=angle;return;}
    const a1=a+gap/2,a2=a+angle-gap/2;
    const ox1=cx+or*Math.cos(a1),oy1=cy+or*Math.sin(a1);
    const ox2=cx+or*Math.cos(a2),oy2=cy+or*Math.sin(a2);
    const ix1=cx+ir*Math.cos(a1),iy1=cy+ir*Math.sin(a1);
    const ix2=cx+ir*Math.cos(a2),iy2=cy+ir*Math.sin(a2);
    const lg=angle-gap>Math.PI?1:0;
    paths+=`<path d="M${ox1},${oy1} A${or},${or} 0 ${lg} 1 ${ox2},${oy2} L${ix2},${iy2} A${ir},${ir} 0 ${lg} 0 ${ix1},${iy1} Z" fill="${PC[i%PC.length]}" data-a="piecat" data-v="${d.name}" data-ow="${ow}" style="cursor:pointer" opacity="0.9"><title>${d.name}: ${(pct*100).toFixed(1)}%</title></path>`;
    if(pct>=0.05){
      const mid=a+angle/2;
      const lx=cx+mr*Math.cos(mid),ly=cy+mr*Math.sin(mid);
      labels+=`<text x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="central" fill="#fff" font-size="${pct>=0.12?'12':'10'}" font-weight="700" font-family="'Plus Jakarta Sans',sans-serif" style="pointer-events:none">${(pct*100).toFixed(0)}%</text>`;
    }
    a+=angle;
  });
  const center=`<text x="${cx}" y="${cy-7}" text-anchor="middle" fill="var(--t40)" font-size="9" font-weight="700" letter-spacing="1" font-family="'Plus Jakarta Sans',sans-serif">TOTAL</text><text x="${cx}" y="${cy+9}" text-anchor="middle" fill="var(--fg)" font-size="12" font-weight="800" font-family="'JetBrains Mono',monospace">${fmt(total,'INR')}</text>`;
  return`<svg width="${sz}" height="${sz}" viewBox="0 0 ${sz} ${sz}" style="flex-shrink:0">${paths}${labels}${center}</svg>`;
}

function pieLegend(data,owner){
  const total=data.reduce((s,d)=>s+d.value,0);

  return data.map((d,i)=>`<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;cursor:pointer;padding:4px;border-radius:8px;transition:background .15s" data-a="piecat" data-v="${d.name}" data-ow="${ow}"><div style="width:10px;height:10px;border-radius:3px;background:${PC[i%PC.length]};flex-shrink:0"></div><div style="flex:1;min-width:0"><div style="font-size:12px;font-weight:600;color:var(--t60);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${d.name}</div><div style="font-size:11px;font-weight:700;color:var(--amber);font-family:'JetBrains Mono',monospace">${fmt(d.value,'INR')}</div></div></div>`).join('');
}

function doImp(e){

    try{
      const wb=XLSX.read(ev.target.result,{type:'array',cellDates:false,raw:false});
      const is=wb.Sheets['Investments'];
      if(is){const rows=XLSX.utils.sheet_to_json(is);const parsed=rows.map(r=>({id:r.ID||uid(),owner:r.Owner||'Self',country:r.Country||'India',category:r.Category||'',fundName:r['Fund/Stock Name']||'',method:r.Method||'One-Time',qty:r.Qty?Number(r.Qty):null,buyPrice:r['Buy Price']?Number(r['Buy Price']):null,amount:Number(r.Amount)||0,currency:r.Currency||'INR',date:toI(r.Date),notes:r.Notes||''}));if(S.impM==='replace')S.inv=parsed;else{const ids=new Set(S.inv.map(i=>i.id));S.inv=[...S.inv,...parsed.filter(p=>!ids.has(p.id))];}sI();}
      const ss=wb.Sheets['Settings'];
      if(ss){const rows=XLSX.utils.sheet_to_json(ss);const sp=v=>v?v.split(', ').map(s=>s.trim()).filter(Boolean):[];rows.forEach(r=>{if(r.Setting==='Exchange Rate (GBP to INR)')S.sett.exchangeRate=Number(r.Value)||110;else if(r.Setting==='Methods')S.sett.methods=sp(r.Value);else if(r.Setting==='Categories: India')S.sett.categories.India=sp(r.Value);else if(r.Setting==='Categories: UK')S.sett.categories.UK=sp(r.Value);else if(r.Setting?.startsWith('Funds: '))S.sett.funds[r.Setting.replace('Funds: ','')]=sp(r.Value);});sS();}
      toast('Imported ('+S.impM+')');R();
    }catch(err){toast('Failed: '+err.message,'e');}

  };

function saveValuation(){
  const invested=getInvested();
  const keys=Object.keys(invested);
  const values={};
  let anyFilled=false;
  keys.forEach(k=>{
    const inp=document.getElementById('val_'+k.replace(/[^a-zA-Z0-9]/g,'_'));
    if(inp&&inp.value!==''){values[k]=Number(inp.value);anyFilled=true;}
  });
  if(!anyFilled){toast('Enter at least one current value','e');return;}
  // If user left some blank, carry forward from latest snapshot or use invested
  const prev=latestVal();
  keys.forEach(k=>{if(values[k]===undefined){values[k]=prev?.values?.[k]??invested[k];}});
  const dateInp=document.getElementById('valDate');
  const date=dateInp?dateInp.value:new Date().toISOString().slice(0,10);
  // Remove existing snapshot for same date (replace)
  S.vals=S.vals.filter(v=>v.date!==date);
  S.vals.push({date,ts:Date.now(),values});
  S.vals.sort((a,b)=>a.date.localeCompare(b.date));
  sV();
  toast('Values saved for '+date);
  closeM();
}

function doJsonImp(e){
  const file=e.target.files?.[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const backup=JSON.parse(ev.target.result);
      if(!backup.inv||!Array.isArray(backup.inv))throw new Error('Invalid backup file');
      S.inv=backup.inv;sI();
      if(backup.vals){S.vals=backup.vals;sV();}
      if(backup.sips){S.sips=backup.sips;sP();}
      if(backup.sett){S.sett={...DS,...backup.sett,categories:{...DS.categories,...backup.sett.categories},funds:{...DS.funds,...backup.sett.funds}};sS();}
      ['India','UK'].forEach(c=>{if(!S.sett.categories[c])S.sett.categories[c]=[];if(!S.sett.categories[c].includes('Debt'))S.sett.categories[c].push('Debt');});
      toast('Restored '+S.inv.length+' investments');R();
    }catch(err){toast('Invalid file: '+err.message,'e');}
    e.target.value='';
  };
  reader.readAsText(file);
}

  const gMap={};filtered.forEach(i=>{const k=`${i.owner}||${i.country}||${i.category}||${i.fundName}`;if(!gMap[k])gMap[k]={...i,tot:0,n:0};gMap[k].tot+=i.amount;gMap[k].n+=1;});
  _grps=Object.values(gMap);

  // Sort
  const sc=S.sortCol,sd=S.sortDir==='asc'?1:-1;
  _grps.sort((a,b)=>{
    if(sc==='fundName')return a.fundName.localeCompare(b.fundName)*sd;

    if(sc==='category')return a.category.localeCompare(b.category)*sd;
    if(sc==='method')return a.method.localeCompare(b.method)*sd;
    if(sc==='tot')return(a.tot-b.tot)*sd;
    if(sc==='n')return(a.n-b.n)*sd;
    return(b.tot-a.tot);
  });

  if(!_grps.length)return o+`<div class="empty"><div class="ei">💼</div><h3>No investments found</h3><p>${S.search?'No matches for "'+S.search+'"':'Add your first investment to begin'}</p></div>`;

  let grandTot=0,grandN=0;
  _grps.forEach((g,i)=>{
    const mp=g.method==='SIP'?'ps':'po';const fl=g.country==='India'?'🇮🇳':'🇬🇧';

    grandTot+=g.tot*sign;grandN+=g.n;

async function gsPush(){
  if(!S.jbKey||!S.jbBin){toast('Enter API Key and Bin ID','e');return;}
  if(!S.inv.length){toast('No investments to push','e');return;}
  S.gsyncing=true;R();
  try{
    // Strip internal/null fields to reduce size
    const trimInv=S.inv.map(i=>{const o={id:i.id,ow:i.owner,co:i.country,ca:i.category,fn:i.fundName,me:i.method,am:i.amount,cu:i.currency,dt:i.date};if(i.notes)o.no=i.notes;if(i.qty)o.qt=i.qty;if(i.buyPrice)o.bp=i.buyPrice;return o;});
    const trimSips=S.sips.map(s=>{const o={id:s.id,ow:s.owner,co:s.country,ca:s.category,fn:s.fundName,am:s.amount,cu:s.currency,sd:s.sipDay,fr:s.freq||'monthly',st:s.status,sd2:s.startDate};if(s.skipped&&s.skipped.length)o.sk=s.skipped;return o;});
    const payload={v:4,inv:trimInv,sips:trimSips,vals:S.vals,sett:S.sett,ts:Date.now()};
    const json=JSON.stringify(payload);
    const kb=(json.length/1024).toFixed(1);
    if(json.length>100000){toast('Data too large ('+kb+'KB). Remove old snapshots to reduce size.','e');S.gsyncing=false;R();return;}
    const r=await fetch('https://api.jsonbin.io/v3/b/'+S.jbBin,{
      method:'PUT',
      headers:{'Content-Type':'application/json','X-Master-Key':S.jbKey},
      body:json
    });
    if(r.ok){toast('✅ Pushed! '+S.inv.length+' investments ('+kb+'KB)');}
    else{const d=await r.json();toast('Error: '+(d.message||r.status),'e');}
  }catch(err){toast('Failed: '+err.message,'e');}
  S.gsyncing=false;R();
}

async function gsPull(){
  if(!S.jbKey||!S.jbBin){toast('Enter API Key and Bin ID','e');return;}
  S.gsyncing=true;R();
  try{
    const r=await fetch('https://api.jsonbin.io/v3/b/'+S.jbBin+'/latest',{headers:{'X-Master-Key':S.jbKey}});
    if(!r.ok){const d=await r.json();toast('Error: '+(d.message||r.status),'e');S.gsyncing=false;R();return;}
    const d=await r.json();
    const rec=d.record;
    if(!rec||!rec.inv){toast('No data found in bin','e');S.gsyncing=false;R();return;}
    // Handle compressed format (v4) or full format
    if(rec.v>=4){
      S.inv=rec.inv.map(i=>({id:i.id,owner:i.ow,country:i.co,category:i.ca,fundName:i.fn,method:i.me,amount:i.am,currency:i.cu,date:i.dt,notes:i.no||'',qty:i.qt||null,buyPrice:i.bp||null}));
      if(rec.sips)S.sips=rec.sips.map(s=>({id:s.id,owner:s.ow,country:s.co,category:s.ca,fundName:s.fn,amount:s.am,currency:s.cu,sipDay:s.sd,freq:s.fr||'monthly',status:s.st,startDate:s.sd2,skipped:s.sk||[]}));
    }else{
      S.inv=rec.inv;
      if(rec.sips)S.sips=rec.sips;
    }
    sI();
    if(rec.sips)sP();
    if(rec.vals){S.vals=rec.vals;sV();}
    if(rec.sett){S.sett={...DS,...rec.sett,categories:{...DS.categories,...rec.sett.categories},funds:{...DS.funds,...rec.sett.funds},assetClass:{...DS.assetClass,...(rec.sett.assetClass||{})}};sS();}
    ['India','UK'].forEach(c=>{if(!S.sett.categories[c])S.sett.categories[c]=[];if(!S.sett.categories[c].includes('Debt'))S.sett.categories[c].push('Debt');});
    toast('✅ Pulled '+S.inv.length+' investments');
  }catch(err){toast('Failed: '+err.message,'e');}
  S.gsyncing=false;R();
}

function renderValHistory(){
  if(!S.vals.length)return`<div class="empty" style="padding:30px"><p>No snapshots yet. Update values from the dashboard to create your first snapshot.</p></div><div style="margin-top:16px"><button class="bg" style="width:100%" data-a="openVals">← Update Values</button></div>`;
  const rate=S.sett.exchangeRate||110;
  const ti=(a,c)=>c==='GBP'?a*rate:a;
  let o=`<p style="font-size:13px;color:var(--t40);margin-bottom:14px">${S.vals.length} snapshot${S.vals.length!==1?'s':''} recorded</p>`;

  // Show snapshots newest first
  const sorted=[...S.vals].reverse();
  sorted.forEach((snap,ri)=>{
    const idx=S.vals.length-1-ri;
    const invested=getInvestedAsOf(snap.date);
    const keys=Object.keys(snap.values).sort();
    let totalInv=0,totalCur=0;
    keys.forEach(k=>{const[,country]=k.split('::');const cur=country==='India'?'INR':'GBP';totalInv+=ti(invested[k]||0,cur);totalCur+=ti(snap.values[k]||0,cur);});
    const pnl=totalCur-totalInv;
    const pnlPct=totalInv?((pnl/totalInv)*100).toFixed(1):0;
    const isUp=pnl>=0;
    o+=`<div class="card"><div class="chd" style="padding:14px 20px"><div style="display:flex;align-items:center;justify-content:space-between"><div><div style="font-size:14px;font-weight:700">${snap.date}</div><div style="font-size:12px;color:var(--t40);margin-top:2px">Invested: ${fmt(totalInv,'INR')} → Current: ${fmt(totalCur,'INR')}</div></div><div style="text-align:right"><div class="mono" style="font-size:15px;font-weight:800;color:${isUp?'var(--green)':'var(--red)'}">${isUp?'+':''}${fmt(pnl,'INR')}</div><div style="font-size:11px;color:${isUp?'var(--green)':'var(--red)'}">${isUp?'▲':'▼'} ${Math.abs(pnlPct)}%</div></div></div></div>`;
    o+=`<div class="cbd" style="padding:10px 20px">`;
    keys.forEach(k=>{
      const[owner,country,category]=k.split('::');
      const cur=country==='India'?'INR':'GBP';
      const inv=invested[k]||0;
      const cv=snap.values[k]||0;
      const d=cv-inv;const dp=inv?((d/inv)*100).toFixed(1):0;
      const up=d>=0;
      o+=`<div style="display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--brd);font-size:12px"><div style="color:var(--t60)">${owner} · ${country==='India'?'🇮🇳':'🇬🇧'} ${category}</div><div style="display:flex;gap:12px;align-items:center"><span class="mono" style="color:var(--t40)">${fmt(cv,cur)}</span><span class="mono" style="font-weight:700;color:${up?'var(--green)':'var(--red)'}">${up?'+':''}${fmt(d,cur)} (${up?'+':''}${dp}%)</span></div></div>`;
    });
    o+=`<div style="margin-top:8px;text-align:right"><button class="bd" style="font-size:11px;padding:4px 10px;min-height:28px" data-a="delSnap" data-idx="${idx}">Delete</button></div></div></div>`;
  });
  o+=`<div style="margin-top:8px"><button class="bg" style="width:100%" data-a="openVals">← Update Values</button></div>`;
  return o;
}

    date=`${y}-${String(m).padStart(2,'0')}-${String(sip.sipDay).padStart(2,'0')}`;
  }
  S.inv.push({id:uid(),owner:sip.owner,country:sip.country,category:sip.category,fundName:sip.fundName,method:'SIP',amount:sip.amount,currency:sip.currency,date,notes:'Auto from SIP',qty:null,buyPrice:null,_sipId:sipId,_sipMonth:mKey,_ts:Date.now()});
  S.pendingSips=S.pendingSips.filter(p=>!(p.sip.id===sipId&&p.mKey===mKey));
  const label=freq==='weekly'?date:`${MOS[Number(mKey.split('-')[1])-1]} ${mKey.split('-')[0]}`;
  sI();toast('Added '+label);R();
}
function skipPendingSip(sipId,mKey){
  const sip=S.sips.find(s=>s.id===sipId);if(!sip)return;
  if(!sip.skipped)sip.skipped=[];
  sip.skipped.push(mKey);
  S.pendingSips=S.pendingSips.filter(p=>!(p.sip.id===sipId&&p.mKey===mKey));
  sP();toast('Skipped','i');R();
}

function renderSips(){
  let o='';
  // Pending SIPs banner
  if(S.pendingSips.length){
    o+=`<div class="card" style="border-color:var(--amber)"><div class="cbd"><div style="font-size:14px;font-weight:700;margin-bottom:10px;color:var(--amber)">⏳ ${S.pendingSips.length} Pending SIP${S.pendingSips.length!==1?'s':''}</div>`;
    S.pendingSips.forEach(p=>{
      const fl=p.sip.country==='India'?'🇮🇳':'🇬🇧';
      const label=p.sip.freq==='weekly'?`Week ${p.week}, ${MOS[p.month]} ${p.year}`:`${MOS[p.month]} ${p.year}`;
      o+=`<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--brd);gap:8px;flex-wrap:wrap"><div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600">${p.sip.fundName}</div><div style="font-size:11px;color:var(--t40)">${p.sip.owner} · ${fl} ${label} · ${fmt(p.sip.amount,p.sip.currency)}</div></div><div style="display:flex;gap:6px"><button class="bp bs" data-a="confirmSip" data-id="${p.sip.id}" data-mk="${p.mKey}">✅ Add</button><button class="bg bs" data-a="skipSip" data-id="${p.sip.id}" data-mk="${p.mKey}">⏭ Skip</button></div></div>`;
    });
    o+=`</div></div>`;
  }

  // Filters
  const allCats=[...new Set(S.sips.map(s=>s.category))].sort();
  o+=`<div class="fbar" style="margin-bottom:14px"><select class="fsel" data-a="sipflt" data-k="owner"><option value="All">All Owners</option>${OW.map(ow=>`<option ${S.sipF.owner===ow?'selected':''}>${ow}</option>`).join('')}</select>`;
  o+=`<select class="fsel" data-a="sipflt" data-k="country"><option value="All">All Countries</option><option ${S.sipF.country==='India'?'selected':''}>India</option><option ${S.sipF.country==='UK'?'selected':''}>UK</option></select>`;
  o+=`<select class="fsel" data-a="sipflt" data-k="status"><option value="All">All Status</option><option value="active" ${S.sipF.status==='active'?'selected':''}>Active</option><option value="paused" ${S.sipF.status==='paused'?'selected':''}>Paused</option></select>`;
  o+=`<div class="spacer"></div><button class="bp bs" data-a="addSip">+ New SIP</button></div>`;

  const filtered=S.sips.filter(s=>(S.sipF.owner==='All'||s.owner===S.sipF.owner)&&(S.sipF.country==='All'||s.country===S.sipF.country)&&(S.sipF.status==='All'||s.status===S.sipF.status));

  if(!filtered.length){
    o+=`<div class="empty"><div class="ei">🔁</div><h3>${S.sips.length?'No SIPs match filters':'No SIPs yet'}</h3><p>${S.sips.length?'Try changing your filters':'Create a SIP master to track recurring investments'}</p></div>`;
  }else{
    const active=filtered.filter(s=>s.status==='active');
    const paused=filtered.filter(s=>s.status==='paused');
    [['🟢 Active',active],['⏸ Paused',paused]].forEach(([label,list])=>{
      if(!list.length)return;
      o+=`<div style="font-size:12px;font-weight:700;color:var(--t25);text-transform:uppercase;letter-spacing:.8px;margin:14px 0 8px">${label} (${list.length})</div>`;
      list.forEach(sip=>{
        const fl=sip.country==='India'?'🇮🇳':'🇬🇧';
        const entries=S.inv.filter(i=>i.fundName===sip.fundName&&i.owner===sip.owner&&i.category===sip.category&&i.country===sip.country&&i.method==='SIP'&&i.amount>0).length;
        const freqLabel=sip.freq==='weekly'?'/week':'/month';
        const dayLabel=sip.freq==='weekly'?['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][sip.sipDay]||'Day '+sip.sipDay:'Day '+sip.sipDay;
        o+=`<div class="card" style="margin-bottom:10px"><div class="cbd" style="padding:14px 16px"><div style="display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap"><div style="flex:1;min-width:0"><div style="font-size:14px;font-weight:700">${sip.fundName}</div><div style="font-size:12px;color:var(--t40);margin-top:2px">${sip.owner} · ${fl} ${sip.country} · ${sip.category}</div><div style="font-size:13px;margin-top:4px"><span class="mono" style="font-weight:700;color:var(--amber)">${fmt(sip.amount,sip.currency)}</span><span style="color:var(--t40)"> ${freqLabel} · ${dayLabel} · ${entries} entries</span></div></div><div style="display:flex;gap:6px;flex-shrink:0"><button class="bg bs" data-a="pauseSip" data-id="${sip.id}">${sip.status==='active'?'⏸':'▶'}</button><button class="bg bs" data-a="editSip" data-id="${sip.id}">✏️</button><button class="bd" style="padding:4px 10px;min-height:28px;min-width:32px;font-size:11px" data-a="delSip" data-id="${sip.id}">🗑</button></div></div></div></div>`;
      });
    });
    // Summary
    const activeFilt=filtered.filter(s=>s.status==='active');
    const mINR=activeFilt.filter(s=>s.freq!=='weekly'&&s.currency==='INR').reduce((s,p)=>s+p.amount,0);
    const mGBP=activeFilt.filter(s=>s.freq!=='weekly'&&s.currency==='GBP').reduce((s,p)=>s+p.amount,0);
    const wINR=activeFilt.filter(s=>s.freq==='weekly'&&s.currency==='INR').reduce((s,p)=>s+p.amount,0);
    const wGBP=activeFilt.filter(s=>s.freq==='weekly'&&s.currency==='GBP').reduce((s,p)=>s+p.amount,0);
    if(mINR||mGBP||wINR||wGBP){
      o+=`<div style="margin-top:10px;padding:12px 16px;border-radius:12px;background:var(--card);border:1px solid var(--brd);font-size:13px;color:var(--t40)">Active SIP total: `;
      const parts=[];
      if(mINR)parts.push(`<span class="mono" style="font-weight:700;color:var(--amber)">${fmt(mINR,'INR')}</span>/month`);
      if(mGBP)parts.push(`<span class="mono" style="font-weight:700;color:var(--amber)">${fmt(mGBP,'GBP')}</span>/month`);
      if(wINR)parts.push(`<span class="mono" style="font-weight:700;color:var(--amber)">${fmt(wINR,'INR')}</span>/week`);
      if(wGBP)parts.push(`<span class="mono" style="font-weight:700;color:var(--amber)">${fmt(wGBP,'GBP')}</span>/week`);
      o+=parts.join(' + ')+`</div>`;
    }
  }
  return o;
}

function renderSipForm(){
  const f=S.edit||{owner:S.lastOwner,country:S.lastCountry,category:'',fundName:'',amount:'',sipDay:'',freq:'monthly',startDate:new Date().toISOString().slice(0,10)};

  const cats=gC(f.country);const funds=gF(f.country,f.category);

  `<div class="fr" style="margin-bottom:16px"><div><label class="fl">Quantity</label><input class="fi" type="number" id="fQty" value="${f.qty||''}" placeholder="No. of shares" min="0" step="1"></div>

  <div><label class="fl">Country</label><select class="fs" id="fCountry"><option value="India" ${f.country==='India'?'selected':''}>🇮🇳 India</option><option value="UK" ${f.country==='UK'?'selected':''}>🇬🇧 UK</option></select></div></div>
  <div style="margin-bottom:16px"><label class="fl">Category</label><div id="catA"><select class="fs" id="fCat"><option value="">Select category...</option>${cats.map(c=>`<option ${f.category===c?'selected':''}>${c}</option>`).join('')}<option value="__new">＋ Add new category...</option></select></div></div>
  <div style="margin-bottom:16px"><label class="fl">${fundLabel}</label><div id="fundA">${!f.category?'<p style="font-size:13px;color:var(--t25);font-style:italic;padding:8px 0">Select a category first</p>':`<select class="fs" id="fFund"><option value="">Select ${isDbt?'debt type':'fund/stock'}...</option>${funds.map(fn=>`<option ${f.fundName===fn?'selected':''}>${fn}</option>`).join('')}<option value="__new">＋ Add new ${isDbt?'debt type':'fund/stock'}...</option></select>${funds.length===0?`<p class="fh">No ${isDbt?'debt types':'funds'} yet — select "Add new" above</p>`:''}`}</div></div>

  ${amtSection}
  <div style="margin-bottom:16px"><label class="fl">Date</label><input class="fi" type="date" id="fDate" value="${toI(f.date)}"></div>

  let o=`<div class="stabs">${tabs.map(t=>`<button class="stab ${S.sTab===t.id?'on':''}" data-a="stab" data-v="${t.id}">${t.l}</button>`).join('')}</div>`;

  if(S.sTab==='general'){
    const isLight=document.documentElement.classList.contains('light');
    o+=`<div style="margin-bottom:16px;display:flex;align-items:center;justify-content:space-between"><div><label class="fl" style="margin:0">Theme</label><p style="font-size:12px;color:var(--t40);margin-top:2px">Currently: ${isLight?'Light ☀️':'Dark 🌙'}</p></div><button class="bp bs" data-a="theme" style="min-width:90px">${isLight?'🌙 Dark':'☀️ Light'}</button></div>
    <div style="margin-bottom:16px"><label class="fl">GBP → INR Exchange Rate</label><div style="display:flex;align-items:center;gap:10px;margin-top:6px"><span style="font-size:13px;color:var(--t40)">1 GBP =</span><input class="fi" type="number" id="sRate" value="${S.sett.exchangeRate}" style="width:100px"><span style="font-size:13px;color:var(--t40)">INR</span></div></div>

  } else if(S.sTab==='categories'){
    ['India','UK'].forEach(c=>{
      const cats=gC(c);
      o+=`<div style="margin-bottom:24px"><div style="font-size:14px;font-weight:700;margin-bottom:10px">${c==='India'?'🇮🇳':'🇬🇧'} ${c}</div>`;
      cats.forEach(cat=>{o+=`<div class="si"><span style="flex:1">${cat}</span><button class="bg bs" data-a="ecat" data-v="${c}::${cat}" style="margin-right:6px">✏️</button><button class="bd" data-a="rcat" data-v="${c}::${cat}">Remove</button></div>`;});

    });
  } else if(S.sTab==='methods'){
    o+=`<p style="font-size:13px;color:var(--t40);margin-bottom:12px">Configure investment methods</p>`;
    gM().forEach(m=>{o+=`<div class="si"><span style="flex:1">${m}</span><button class="bg bs" data-a="emet" data-v="${m}" style="margin-right:6px">✏️</button><button class="bd" data-a="rmet" data-v="${m}">Remove</button></div>`;});
    o+=`<div style="display:flex;gap:8px;margin-top:10px"><input class="fi" placeholder="Add method..." id="amIn" style="flex:1"><button class="bp bs" data-a="amet">Add</button></div>`;
  } else if(S.sTab==='funds'){
    o+=`<p style="font-size:13px;color:var(--t40);margin-bottom:14px">Tap a category to manage its funds.</p><div class="fg">`;

      const funds=gF(c,cat);

    }));

  return o;

  else{o+=`<div class="empty" style="padding:30px"><p style="font-size:13px">No funds yet. Add above.</p></div>`;}

}
